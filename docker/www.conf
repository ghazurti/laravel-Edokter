; PHP-FPM pool — tuning E-Dokter RSUD
; Server app RAM 4 GB (DB terpisah). Tiap worker ≈ 60–80 MB.
;   25 worker ≈ 1.8–2 GB → sisakan ~2 GB untuk OS/Docker/nginx/OPcache.
;   Ini batas aman 4 GB; jangan > 28 di RAM 4 GB (cegah swap).
;   Concurrency riil 50 dokter biasanya < 15 request bersamaan, jadi 25 cukup.
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 25
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 10
pm.max_requests = 500
pm.process_idle_timeout = 10s

; Worker yang nyangkut > 120s dibunuh (cegah query berat menahan worker selamanya)
request_terminate_timeout = 120s

catch_workers_output = yes
clear_env = no

; status page (opsional, untuk monitoring) — aktifkan bila perlu:
; pm.status_path = /fpm-status
